[server]
headless = true
enableCORS = false
enableXsrfProtection = false
maxUploadSize = 50

[browser]
gatherUsageStats = false

[client]

toolbarMode = "minimal"

[theme]

primaryColor = "#E67E22"
backgroundColor = "#203b53"
secondaryBackgroundColor = "#2c4a67"
textColor = "#F0F4F8"
font = "sans serif"

[ui]

hideTopBar = true
